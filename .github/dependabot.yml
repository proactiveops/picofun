version: 2

updates:
  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: daily
      time: "02:00"
    cooldown:
      default-days: 1
    groups:
      pytest:
        patterns:
          - "pytest*"
      qa:
        patterns:
          - "ruff*"
          - "ty*"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 10

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "03:00"
    cooldown:
      default-days: 1
    labels:
      - "dependencies"
      - "actions"
    open-pull-requests-limit: 5
